<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 · Gourmet Community</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,500&family=Source+Sans+3:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/login.css">
    <script src="./js/api.js" defer></script>
    <script src="./js/login.js" defer></script>
</head>
<body>
    <div class="page">
        <div class="atmosphere" aria-hidden="true"></div>

        <main class="main">
            <section class="login-box">
                <header class="brand">
                    <img
                        class="brand-logo"
                        src="./gourmet_community_logo.png"
                        alt="Gourmet Community"
                        width="160"
                        height="160"
                    >
                    <p class="brand-tagline">개발 학습 커뮤니티</p>
                </header>

                <h2 class="auth-title">로그인</h2>
                <p class="auth-subtitle">다시 오신 것을 환영합니다</p>

                <form id="login-form" novalidate>
                    <div class="input-group">
                        <label for="email">이메일</label>
                        <input
                            type="email"
                            id="email"
                            placeholder="이메일을 입력하세요"
                            autocomplete="email"
                        >
                        <p class="helper-text" id="email-helper"></p>
                    </div>

                    <div class="input-group">
                        <label for="password">비밀번호</label>
                        <input
                            type="password"
                            id="password"
                            placeholder="비밀번호를 입력하세요"
                            autocomplete="current-password"
                        >
                        <p class="helper-text" id="password-helper"></p>
                    </div>

                    <button type="submit" id="login-button" disabled>
                        로그인
                    </button>
                </form>

                <p class="auth-footer">
                    아직 계정이 없으신가요?
                    <button type="button" id="signup-button" class="signup-button">
                        회원가입
                    </button>
                </p>
            </section>
        </main>
    </div>
</body>
</html>
