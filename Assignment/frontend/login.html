<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인</title>
    <link rel="stylesheet" href="./css/login.css">
    <script src="./js/api.js" defer></script>
    <script src="./js/login.js" defer></script>
</head>
<body>
    <div class="page">
        <header class="header">
            <h1 id="main-logo">Gourmet</h1>
        </header>

        <main class="main">
            <section class="login-box">
                <h2>로그인</h2>

                <form id="login-form" novalidate>
                    <div class="input-group">
                        <label for="email">이메일</label>
                        <input
                            type="email"
                            id="email"
                            placeholder="이메일을 입력하세요"
                        >
                        <p class="helper-text" id="email-helper"></p>
                    </div>

                    <div class="input-group">
                        <label for="password">비밀번호</label>
                        <input
                            type="password"
                            id="password"
                            placeholder="비밀번호를 입력하세요"
                        >
                        <p class="helper-text" id="password-helper"></p>
                    </div>

                    <button type="submit" id="login-button" disabled>
                        로그인
                    </button>
                </form>

                <button type="button" id="signup-button" class="signup-button">
                    회원가입
                </button>
            </section>
        </main>
    </div>
</body>
</html>
