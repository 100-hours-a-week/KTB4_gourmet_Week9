<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원정보수정 · Gourmet Community</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,500&family=Source+Sans+3:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/gc-theme.css">
    <link rel="stylesheet" href="./css/edit-profile.css">
    <link rel="stylesheet" href="./css/profile-menu.css">
    <script src="./js/api.js" defer></script>
    <script src="./js/profile-menu.js" defer></script>
    <script src="./js/navigation.js" defer></script>
    <script src="./js/edit-profile.js" defer></script>
</head>
<body>
    <div class="page">
        <div class="atmosphere" aria-hidden="true"></div>

        <header class="header profile-header">
            <img class="header-logo" id="main-logo" src="./gourmet_community_logo.png" alt="Gourmet Community" width="48" height="48">
            <div class="profile-menu-wrapper">
                <button type="button" class="header-profile-button" id="header-profile-button" aria-label="프로필 메뉴"></button>
                <ul class="profile-dropdown" id="profile-dropdown">
                    <li id="go-edit-profile">회원정보수정</li>
                    <li id="go-edit-password">비밀번호수정</li>
                    <li id="logout-button">로그아웃</li>
                </ul>
            </div>
        </header>

        <main class="main">
            <section class="edit-profile-box">
                <div class="page-title-row">
                    <button type="button" class="back-to-posts-button" id="back-to-posts-button" aria-label="게시판으로">‹</button>
                    <div class="title-block">
                        <p class="form-eyebrow">Account</p>
                        <h2>회원정보수정</h2>
                    </div>
                </div>

                <form id="edit-profile-form" novalidate>
                    <div class="profile-edit-area">
                        <label class="profile-label">프로필 사진*</label>

                        <label for="profile-image-input" class="profile-image-box" id="profile-image-box">
                            <span class="profile-change-text">변경</span>
                            <img id="profile-preview" src="" alt="프로필 이미지">
                        </label>

                        <input type="file" id="profile-image-input" accept="image/*" hidden>
                    </div>

                    <div class="input-group">
                        <label>이메일</label>
                        <p class="email-text" id="email-text"></p>
                    </div>

                    <div class="input-group">
                        <label for="nickname">닉네임</label>
                        <input type="text" id="nickname" maxlength="10">
                        <p class="helper-text" id="nickname-helper"></p>
                    </div>

                    <button type="submit" id="edit-button" class="active">
                        수정하기
                    </button>
                </form>

                <button type="button" class="withdraw-button" id="withdraw-button">
                    회원 탈퇴
                </button>

                <div class="toast" id="toast">수정완료</div>
            </section>
        </main>
    </div>

    <div class="modal-backdrop" id="withdraw-modal">
        <div class="modal">
            <h3>회원탈퇴 하시겠습니까?</h3>
            <div class="modal-buttons">
                <button type="button" class="cancel-button" id="withdraw-cancel">취소</button>
                <button type="button" class="confirm-button" id="withdraw-confirm">확인</button>
            </div>
        </div>
    </div>
</body>
</html>
