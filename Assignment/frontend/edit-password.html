<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>비밀번호 수정 · Gourmet Community</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,500&family=Source+Sans+3:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/gc-theme.css">
    <link rel="stylesheet" href="./css/edit-password.css">
    <link rel="stylesheet" href="./css/profile-menu.css">
    <script src="./js/api.js" defer></script>
    <script src="./js/profile-menu.js" defer></script>
    <script src="./js/navigation.js" defer></script>
    <script src="./js/edit-password.js" defer></script>
</head>
<body>
    <div class="page">
        <div class="atmosphere" aria-hidden="true"></div>

        <header class="header profile-header">
            <img class="header-logo" id="main-logo" src="./gourmet_community_logo.png" alt="Gourmet Community" width="48" height="48">
            <div class="profile-menu-wrapper">
                <button type="button" class="header-profile-button" id="header-profile-button" aria-label="프로필 메뉴"></button>
                <ul class="profile-dropdown" id="profile-dropdown">
                    <li id="go-edit-profile">회원정보수정</li>
                    <li id="go-edit-password">비밀번호수정</li>
                    <li id="logout-button">로그아웃</li>
                </ul>
            </div>
        </header>

        <main class="main">
            <section class="edit-password-box">
                <div class="page-title-row">
                    <button type="button" class="back-to-posts-button" id="back-to-posts-button" aria-label="게시판으로">‹</button>
                    <div class="title-block">
                        <p class="form-eyebrow">Account</p>
                        <h2>비밀번호 수정</h2>
                    </div>
                </div>

                <form id="edit-password-form" novalidate>
                    <div class="input-group">
                        <label for="password">비밀번호</label>
                        <input
                            type="password"
                            id="password"
                            placeholder="비밀번호를 입력하세요"
                            autocomplete="new-password"
                        >
                        <p class="helper-text" id="password-helper"></p>
                    </div>

                    <div class="input-group">
                        <label for="password-check">비밀번호 확인</label>
                        <input
                            type="password"
                            id="password-check"
                            placeholder="비밀번호를 한번 더 입력하세요"
                            autocomplete="new-password"
                        >
                        <p class="helper-text" id="password-check-helper"></p>
                    </div>

                    <button type="submit" id="edit-button" disabled>
                        수정하기
                    </button>
                </form>

                <div class="toast" id="toast">수정완료</div>
            </section>
        </main>
    </div>
</body>
</html>
