<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>비밀번호 수정</title>
    <link rel="stylesheet" href="./css/edit-password.css">
    <link rel="stylesheet" href="./css/profile-menu.css">
    <link rel="stylesheet" href="./css/navigation.css">
    <script src="./js/api.js" defer></script>
    <script src="./js/profile-menu.js" defer></script>
    <script src="./js/navigation.js" defer></script>
    <script src="./js/edit-password.js" defer></script>
</head>
<body>
    <div class="page">
        <header class="header">
            <h1 id="main-logo">Gourmet</h1>

            <div class="profile-menu-wrapper">
                <button type="button" class="header-profile-button" id="header-profile-button"></button>

                <ul class="profile-dropdown" id="profile-dropdown">
                    <li id="go-edit-profile">회원정보수정</li>
                    <li id="go-edit-password">비밀번호수정</li>
                    <li id="logout-button">로그아웃</li>
                </ul>
            </div>
        </header>

        <main class="main">
            <section class="edit-password-box">
                <div class="page-title-row">
                    <button class="back-to-posts-button" id="back-to-posts-button">&larr;</button>
                    <h2>비밀번호 수정</h2>
                </div>

                <form id="edit-password-form" novalidate>
                    <div class="input-group">
                        <label for="password">비밀번호</label>
                        <input
                            type="password"
                            id="password"
                            placeholder="비밀번호를 입력하세요"
                        >
                        <p class="helper-text" id="password-helper"></p>
                    </div>

                    <div class="input-group">
                        <label for="password-check">비밀번호 확인</label>
                        <input
                            type="password"
                            id="password-check"
                            placeholder="비밀번호를 한번 더 입력하세요"
                        >
                        <p class="helper-text" id="password-check-helper"></p>
                    </div>

                    <button type="submit" id="edit-button" disabled>
                        수정하기
                    </button>
                </form>

                <div class="toast" id="toast">수정완료</div>
            </section>
        </main>
    </div>
</body>
</html>
