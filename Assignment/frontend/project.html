<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>프로젝트 모집 · Gourmet Community</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,500&family=Source+Sans+3:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/gc-theme.css">
    <link rel="stylesheet" href="./css/board-shell.css">
    <link rel="stylesheet" href="./css/board-project.css">
    <link rel="stylesheet" href="./css/profile-menu.css">
    <script src="./js/api.js" defer></script>
    <script src="./js/board-meta.js" defer></script>
    <script src="./js/profile-menu.js" defer></script>
    <script src="./js/navigation.js" defer></script>
    <script src="./js/board-shell.js" defer></script>
    <script src="./js/board-list.js" defer></script>
</head>
<body data-board="project">
    <div class="page">
        <div class="atmosphere" aria-hidden="true"></div>

        <header class="header">
            <button type="button" class="nav-toggle" id="nav-toggle" aria-label="게시판 메뉴 닫기" aria-expanded="true" aria-controls="board-sidebar">
                <span class="nav-toggle-bar"></span>
                <span class="nav-toggle-bar"></span>
                <span class="nav-toggle-bar"></span>
            </button>

            <img class="header-logo" id="main-logo" src="./gourmet_community_logo.png" alt="Gourmet Community" width="52" height="52">

            <form class="header-search" id="header-search" role="search">
                <label class="visually-hidden" for="search-input">통합 검색</label>
                <input type="search" id="search-input" name="q" placeholder="프로젝트 검색" autocomplete="off">
                <button type="submit" class="search-submit">검색</button>
            </form>

            <div class="profile-menu-wrapper">
                <button type="button" class="profile-button" id="header-profile-button" aria-label="프로필 메뉴"></button>
                <ul class="profile-dropdown" id="profile-dropdown">
                    <li id="go-edit-profile">회원정보수정</li>
                    <li id="go-edit-password">비밀번호수정</li>
                    <li id="logout-button">로그아웃</li>
                </ul>
            </div>
        </header>

        <div class="layout" id="layout">
            <aside class="sidebar" id="board-sidebar" aria-label="게시판 메뉴">
                <p class="sidebar-label">게시판</p>
                <nav class="board-nav">
                    <a class="board-link" data-board="free" href="./posts.html">자유 게시판</a>
                    <a class="board-link" data-board="question" href="./question.html">질문 게시판</a>
                    <a class="board-link" data-board="study" href="./study.html">학습 기록</a>
                    <a class="board-link is-active" data-board="project" href="./project.html">프로젝트 모집</a>
                </nav>
            </aside>

            <main class="board-main board-project">
                <section class="intro-section">
                    <p class="intro-eyebrow">Project Recruit</p>
                    <h2 class="intro-title">프로젝트 모집</h2>
                    <p class="intro-desc">함께할 팀원을 찾고, 모집 기간을 명확히 남겨보세요.</p>
                </section>

                <section class="action-section">
                    <h3 class="list-heading">모집 공고</h3>
                    <a href="./project-create.html" id="write-button" class="write-button">모집 글쓰기</a>
                </section>

                <section class="post-list" id="post-list"></section>
            </main>
        </div>
    </div>
</body>
</html>
